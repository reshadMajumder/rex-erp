components:
  schemas:
    CategoryEnum:
      enum:
      - general
      - materials
      - travel
      - software
      - equipment
      - office
      - marketing
      - utilities
      - other
      type: string
      description: |-
        * `general` - General
        * `materials` - Materials
        * `travel` - Travel
        * `software` - Software
        * `equipment` - Equipment
        * `office` - Office
        * `marketing` - Marketing
        * `utilities` - Utilities
        * `other` - Other
    Client:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        phone:
          type: string
          nullable: true
          maxLength: 50
        company:
          type: string
          nullable: true
          maxLength: 200
        address:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - updated_at
    CreateEmployee:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          minLength: 6
        phone:
          type: string
          maxLength: 50
        role:
          type: string
          maxLength: 100
      required:
      - email
      - name
      - password
    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        phone:
          type: string
          nullable: true
          maxLength: 50
        role:
          type: string
          nullable: true
          maxLength: 100
        has_login:
          type: string
          readOnly: true
        user_id:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - has_login
      - id
      - name
      - updated_at
      - user_id
    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        project_id:
          type: string
          format: uuid
          nullable: true
          readOnly: true
        project_name:
          type: string
          readOnly: true
        category:
          $ref: '#/components/schemas/CategoryEnum'
        description:
          type: string
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        vendor:
          type: string
          nullable: true
          maxLength: 200
        expense_date:
          type: string
          format: date
        method:
          type: string
          nullable: true
          maxLength: 100
        reference:
          type: string
          nullable: true
          maxLength: 300
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - expense_date
      - id
      - project_id
      - project_name
      - updated_at
    PaginatedClientList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Client'
