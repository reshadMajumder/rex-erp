        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - id
      - roles
      - updated_at
      - username
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 300
        description:
          type: string
          nullable: true
        client_id:
          type: string
          format: uuid
          nullable: true
        client_name:
          type: string
          readOnly: true
        budget:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - client_name
      - created_at
      - id
      - name
      - updated_at
    ProjectStatusEnum:
      enum:
      - planning
      - active
      - on_hold
      - completed
      - cancelled
      type: string
      description: |-
        * `planning` - Planning
        * `active` - Active
        * `on_hold` - On Hold
        * `completed` - Completed
        * `cancelled` - Cancelled
    Register:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          minLength: 6
        display_name:
          type: string
          maxLength: 150
      required:
      - email
      - password
    ResetPassword:
      type: object
      properties:
        password:
          type: string
          writeOnly: true
          minLength: 6
      required:
      - password
    RoleEnum:
      enum:
      - admin
      - employee
      type: string
      description: |-
        * `admin` - Admin
        * `employee` - Employee
    Todo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        project_id:
          type: string
          format: uuid
          nullable: true
          readOnly: true
        project_name:
          type: string
          readOnly: true
        assignee_id:
          type: string
          format: uuid
          nullable: true
          readOnly: true
        assignee_name:
          type: string
          readOnly: true
        title:
          type: string
          maxLength: 400
        details:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TodoStatusEnum'
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        due_date:
          type: string
          format: date
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - assignee_id
      - assignee_name
      - created_at
      - id
      - project_id
      - project_name
      - title
      - updated_at
    TodoStatusEnum:
      enum:
      - open
      - in_progress
      - done
      - cancelled
      type: string
      description: |-
        * `open` - Open
        * `in_progress` - In Progress
        * `done` - Done
        * `cancelled` - Cancelled
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    UserRole:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - role
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
