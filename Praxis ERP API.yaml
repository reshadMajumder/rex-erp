openapi: 3.0.3
info:
  title: Praxis ERP API
  version: 1.0.0
  description: Internal API for Praxis ERP - Management system for projects, clients,
    employees, expenses, and todos.
paths:
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: POST /api/auth/register/  — public endpoint to create a new user
        account.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/clients/:
    get:
      operationId: clients_list
      description: |-
        Admin-only CRUD for clients.
        GET /api/clients/min/ returns a lightweight list for dropdowns.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
